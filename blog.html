<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Charlie Cheesman</title>
  <script src="config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            sans: ['IBM Plex Sans', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          },
          colors: { accent: '#06b6d4', 'accent-dim': '#0891b2' },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { visibility: hidden; }
    .prose a { color: #06b6d4; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
    .prose a:hover { border-bottom-color: #06b6d4; }
    .accent-line { height: 2px; background: linear-gradient(90deg, #06b6d4 0%, transparent 100%); opacity: 0.8; }
  </style>
</head>
<body class="bg-[#fafaf9] text-neutral-900 font-sans antialiased min-h-screen flex flex-col">
  <div class="max-w-2xl mx-auto px-6 py-16 sm:py-24 flex-1 flex flex-col">
    <header class="mb-12">
      <div class="accent-line w-16 mb-6"></div>
      <p class="text-neutral-500 text-sm mb-2"><a href="index.html" class="text-accent hover:underline">← Home</a></p>
    </header>

    <main>
      <h2 class="font-display text-xl font-semibold text-neutral-900 mb-4">Blog</h2>
      <div id="blog-list" class="space-y-4 text-neutral-700">
        <p class="text-neutral-500">Loading…</p>
      </div>
      <div id="blog-post" class="hidden mt-8 prose prose-neutral max-w-none"></div>
    </main>

    <footer class="mt-auto pt-8 border-t border-neutral-200 text-neutral-500 text-sm">
      <p>© <span id="year"></span></p>
    </footer>
  </div>

  <script>document.getElementById('year').textContent = new Date().getFullYear(); document.fonts.ready.then(function () { requestAnimationFrame(function () { document.body.style.visibility = 'visible'; }); });</script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function () {
      const listEl = document.getElementById('blog-list');
      const postEl = document.getElementById('blog-post');
      const base = window.location.pathname.replace(/\/blog\.html$/, '').replace(/\/$/, '') || '.';
      const listUrl = base + '/blog/list.json';

      fetch(listUrl)
        .then(function (r) { return r.ok ? r.json() : []; })
        .then(function (posts) {
          if (!posts || !posts.length) {
            listEl.innerHTML = '<p class="text-neutral-500">No posts yet. Add markdown files in <code class="font-mono text-sm bg-neutral-100 px-1 rounded">blog/posts/</code> and run the blog list script.</p>';
            return;
          }
          listEl.innerHTML = '';
          posts.forEach(function (p) {
            const a = document.createElement('a');
            a.href = '#blog-post-' + (p.slug || p.file || '');
            a.className = 'block text-neutral-700 hover:text-accent transition-colors';
            a.textContent = p.title || p.slug || p.file;
            const meta = document.createElement('span');
            meta.className = 'text-neutral-500 text-sm block mt-0.5';
            meta.textContent = p.date || '';
            a.appendChild(meta);
            a.addEventListener('click', function (e) {
              e.preventDefault();
              loadPost(p);
            });
            listEl.appendChild(a);
          });
        })
        .catch(function () {
          listEl.innerHTML = '<p class="text-neutral-500">No blog list found. Add <code class="font-mono text-sm bg-neutral-100 px-1 rounded">blog/list.json</code>.</p>';
        });

      function loadPost(p) {
        const slug = (p.slug || p.file || '').replace(/\.md$/, '');
        const url = base + '/blog/posts/' + (p.file || slug + '.md');
        postEl.classList.remove('hidden');
        postEl.innerHTML = '<p class="text-neutral-500">Loading…</p>';
        fetch(url)
          .then(function (r) { return r.text(); })
          .then(function (md) {
            const html = marked.parse(md);
            postEl.innerHTML = html;
            postEl.querySelectorAll('a').forEach(function (a) { a.classList.add('text-accent'); });
            postEl.scrollIntoView({ behavior: 'smooth' });
          })
          .catch(function () {
            postEl.innerHTML = '<p class="text-neutral-500">Could not load post.</p>';
          });
      }
    })();
  </script>
</body>
</html>
