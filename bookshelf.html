<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookshelf — Charlie Cheesman</title>
  <script src="config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            sans: ['IBM Plex Sans', 'system-ui', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          },
          colors: { accent: '#06b6d4', 'accent-dim': '#0891b2' },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { visibility: hidden; }
    .prose a { color: #06b6d4; text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.2s; }
    .prose a:hover { border-bottom-color: #06b6d4; }
    .accent-line { height: 2px; background: linear-gradient(90deg, #06b6d4 0%, transparent 100%); opacity: 0.8; }
  </style>
</head>
<body class="bg-[#fafaf9] text-neutral-900 font-sans antialiased min-h-screen flex flex-col text-sm">
  <div class="max-w-2xl pl-12 pr-6 pt-10 pb-16 sm:pt-14 flex-1 flex flex-col">
    <header class="mb-12">
      <div class="accent-line w-16 mb-6"></div>
      <p class="text-neutral-500 text-sm mb-2"><a href="index.html" class="text-accent hover:underline">← Home</a></p>
    </header>

    <main>
      <h2 class="font-display text-xl font-semibold text-neutral-900 mb-4">Bookshelf</h2>
      <div class="prose prose-neutral max-w-none text-neutral-700 leading-relaxed">
        <ul class="list-none space-y-2">
          <li><em>Book Title</em> — Author</li>
          <li><em>Another Book</em> — Author</li>
        </ul>
      </div>
    </main>

    <footer class="mt-auto pt-8 border-t border-neutral-200 text-neutral-500 text-sm">
      <p>© <span id="year"></span></p>
    </footer>
  </div>
  <script>document.getElementById('year').textContent = new Date().getFullYear(); document.fonts.ready.then(function () { requestAnimationFrame(function () { document.body.style.visibility = 'visible'; }); });</script>
</body>
</html>
